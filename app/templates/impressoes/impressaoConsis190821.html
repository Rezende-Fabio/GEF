<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta content="text/html"; charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom_impressao.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='plugin/bootstrap/css/bootstrap.min.css') }}">
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/bootstrap/js/bootstrap.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/jquery/jquery.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/jquery/jquery.mask.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/popper/popper.min.js') }}"></script>  
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/jquery/jquery-ui.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/funcoes.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/pages/paged.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='plugin/pages/paged.legacy.js') }}"></script>

    <title>Impressão Consistência</title>

</head>
<body>
    <header>
        <nav class="navbar" id="navbar" style="margin-bottom: 1.5rem;">
            <div class="header-comi">
                <div class="header-img">
                    <img class="img" src="{{ url_for('static', filename='img/logo3.png') }}" alt="User Icon"/>
                </div>
                <div class="header-titulo">
                    <h5>GEF III</h5>
                    <h7><strong><u>{{ contexto.titulo }}</u></strong></h7> 
                    <h7>Lançamentos do periodo: {{ contexto.datas[0] | data }} a {{ contexto.datas[1] | data }}</h7>
                </div>
                <div class="header-hora">
                    <div id="data-hora"></div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div>
            <table class='table' id="table">
                <thead>
                    <tr>
                        <th style="width: 8%;">Doc.</th>
                        <th style="width: 8%;">Dt. Lanc.</th>
                        <th style="width: 8%;">Cliente</th>
                        <th style="width: 8%;">Vendedor</th>
                        <th style="width: 8%;">Vencimento</th>
                        <th style="width: 6%;">Ref.</th>
                        <th style="width: 4%;">Situação</th>
                        <th style="width: 8%; text-align: right;">Valor Título</th>
                        <th style="width: 8%; text-align: right;">Saldo a Receber</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr id="tr-total-geral">
                    <td id="td-total">Total Geral</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td style='text-align: right;'>R$ 0,00</td>
                    <td style='text-align: right;'>R$ 0,00</td>
                    </tr>
                    
            </tbody>
            </table>
            <div id="btns">
                <a class="btn btn-outline-primary btn-sm" href="javascript:window.print()">Imprimir</a>
                <a class="btn btn-outline-danger btn-sm" href="javascript:window.close()">Fechar</a>
            </div>
            </body>
            <script>
                    
                const zeroFill = n => {
                    return ('0' + n).slice(-2);
                }
                    
                const now = new Date();
            
                const data = zeroFill(now.getUTCDate()) + '/' + zeroFill((now.getMonth() + 1)) + '/' + now.getFullYear();
                const hora = zeroFill(now.getHours()) + ':' + zeroFill(now.getMinutes());
                document.getElementById('data-hora').innerHTML = `<h6>${data}</h6><h6>${hora}</h6>`;
                    
            </script>
            <div id="rodape"></div>
            </html>
